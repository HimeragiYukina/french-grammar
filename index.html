<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>法语语法手册 A1–C2 · Grammaire française</title>
<style>
  :root{
    --bg:#f7f7f9; --panel:#ffffff; --ink:#1d1f24; --muted:#6b7280; --line:#e6e7eb;
    --fr:#0f3d6b; --frbg:#eef4fb; --zh:#3a3f47;
    --accent:#2563eb; --tip:#b4530a; --tipbg:#fdf3e7;
    --a1:#16a34a; --a2:#0891b2; --b1:#d97706; --b2:#9333ea; --c1:#4f46e5; --c2:#be123c;
    --radius:14px; --maxw:880px;
  }
  html[data-theme="dark"]{
    --bg:#15171c; --panel:#1d2027; --ink:#e8eaed; --muted:#9aa0aa; --line:#2c3038;
    --fr:#9cc7f5; --frbg:#18293c; --zh:#c9cdd4;
    --accent:#5b9bf7; --tip:#e8a85c; --tipbg:#2c2415;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;
    line-height:1.7;-webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none}
  /* layout */
  .wrap{display:flex;min-height:100vh}
  #sidebar{width:290px;flex:0 0 290px;background:var(--panel);border-right:1px solid var(--line);
    height:100vh;position:sticky;top:0;overflow-y:auto;padding:18px 14px}
  #main{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center}
  .inner{width:100%;max-width:var(--maxw);padding:0 22px 80px}
  /* sidebar */
  .brand{font-weight:700;font-size:18px;padding:6px 8px 14px;border-bottom:1px solid var(--line);margin-bottom:10px}
  .brand small{display:block;font-weight:400;color:var(--muted);font-size:12px;margin-top:3px}
  .navlevel{font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--muted);
    margin:14px 8px 4px;text-transform:uppercase}
  .navcat{font-size:12.5px;font-weight:600;color:var(--muted);margin:9px 8px 2px}
  .navitem{display:block;padding:4px 10px;border-radius:8px;font-size:13.5px;color:var(--ink);cursor:pointer}
  .navitem:hover{background:var(--frbg)}
  .navitem.active{background:var(--accent);color:#fff}
  /* topbar */
  .topbar{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--bg) 88%,transparent);
    backdrop-filter:blur(8px);padding:14px 0 10px;width:100%;display:flex;justify-content:center}
  .topbar .tb{width:100%;max-width:var(--maxw);padding:0 22px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  #search{flex:1;min-width:160px;padding:9px 13px;border:1px solid var(--line);border-radius:10px;
    background:var(--panel);color:var(--ink);font-size:14px}
  .chips{display:flex;gap:6px;flex-wrap:wrap}
  .chip{padding:6px 11px;border:1px solid var(--line);border-radius:20px;background:var(--panel);
    color:var(--muted);font-size:13px;cursor:pointer;font-weight:600}
  .chip.on{color:#fff;border-color:transparent}
  .chip[data-l="ALL"].on{background:var(--accent)}
  .chip[data-l="A1"].on{background:var(--a1)} .chip[data-l="A2"].on{background:var(--a2)}
  .chip[data-l="B1"].on{background:var(--b1)} .chip[data-l="B2"].on{background:var(--b2)}
  .chip[data-l="C1"].on{background:var(--c1)} .chip[data-l="C2"].on{background:var(--c2)}
  .iconbtn{padding:6px 10px;border:1px solid var(--line);border-radius:10px;background:var(--panel);
    color:var(--ink);cursor:pointer;font-size:14px}
  .ctl{padding:6px 8px;border:1px solid var(--line);border-radius:10px;background:var(--panel);color:var(--ink);font-size:12.5px;max-width:160px}
  .spd{display:flex;align-items:center;gap:4px;padding:4px 9px;border:1px solid var(--line);border-radius:10px;background:var(--panel);font-size:12.5px;color:var(--muted)}
  .spd input[type=range]{width:76px;accent-color:var(--accent);vertical-align:middle}
  .spd b{color:var(--ink);font-weight:600;min-width:42px;text-align:right}
  /* hero */
  .hero{padding:24px 0 6px}
  .hero h1{font-size:27px;margin:0 0 6px}
  .hero p{color:var(--muted);margin:4px 0;font-size:14.5px}
  .count{color:var(--muted);font-size:13px;margin:10px 0 0}
  /* card */
  .cathead{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.04em;
    margin:30px 0 4px;padding-top:8px;border-top:1px dashed var(--line)}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:18px 20px;margin:14px 0;scroll-margin-top:80px}
  .card h3{margin:0;font-size:19px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .card h3 .zh{font-size:15px;color:var(--muted);font-weight:600}
  .badge{font-size:11px;font-weight:700;color:#fff;padding:2px 8px;border-radius:6px}
  .badge.A1{background:var(--a1)} .badge.A2{background:var(--a2)}
  .badge.B1{background:var(--b1)} .badge.B2{background:var(--b2)}
  .badge.C1{background:var(--c1)} .badge.C2{background:var(--c2)}
  .expl{margin:12px 0}
  .expl .zh{color:var(--zh)}
  .expl .fr{color:var(--fr);background:var(--frbg);border-left:3px solid var(--fr);
    padding:8px 12px;border-radius:0 8px 8px 0;margin-top:8px;font-size:14.5px}
  .forms{margin:12px 0;overflow-x:auto}
  table{border-collapse:collapse;width:100%;font-size:14px}
  th,td{border:1px solid var(--line);padding:6px 10px;text-align:left}
  th{background:var(--frbg);color:var(--fr);font-weight:600}
  .ex{margin:6px 0 0;padding:0;list-style:none}
  .ex li{padding:8px 0;border-top:1px solid var(--line)}
  .ex li:first-child{border-top:none}
  .ex .fr{color:var(--fr);font-weight:600;font-size:15px}
  .ex .fr b{color:var(--accent)}
  .ex .zh{color:var(--muted);font-size:13.5px;margin-top:2px}
  .tip{margin-top:13px;background:var(--tipbg);border-radius:10px;padding:10px 13px;font-size:13.8px}
  .tip b{color:var(--tip)}
  .tts{border:none;background:transparent;cursor:pointer;font-size:13px;padding:0 3px;opacity:.5;vertical-align:baseline;line-height:1}
  .tts:hover{opacity:1;transform:scale(1.15)}
  .tts.playing{opacity:1;animation:pulse .8s infinite}
  @keyframes pulse{50%{opacity:.4}}
  .practice{margin-top:14px;border-top:1px solid var(--line);padding-top:11px}
  .practice .label{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .reveal{border:1px solid var(--accent);color:var(--accent);background:transparent;border-radius:7px;padding:1px 8px;font-size:11.5px;cursor:pointer;font-weight:600;margin-left:6px;white-space:nowrap;vertical-align:baseline}
  .reveal:hover{background:var(--accent);color:#fff}
  .say-all{margin-left:auto;border:1px solid var(--accent);color:var(--accent);background:transparent;border-radius:7px;padding:2px 9px;font-size:12px;cursor:pointer;font-weight:600;white-space:nowrap}
  .say-all:hover{background:var(--accent);color:#fff}
  .say-all.playing{background:var(--accent);color:#fff;animation:pulse .8s infinite}
  .say-from{margin-left:6px;border:1px solid var(--accent);color:var(--accent);background:transparent;border-radius:7px;padding:2px 9px;font-size:12px;cursor:pointer;font-weight:600;white-space:nowrap}
  .say-from:hover{background:var(--accent);color:#fff}
  .say-from.playing{background:var(--accent);color:#fff;animation:pulse .8s infinite}
  .card.reading{box-shadow:0 0 0 2px var(--accent)}
  .tts-transport{display:inline-flex;gap:4px}
  .iconbtn:disabled{opacity:.4;cursor:default}
  .qs{margin:8px 0 0;padding-left:24px}
  .qs li{padding:5px 0}
  .qs .q{color:var(--ink);font-size:14.5px}
  .qs .a{margin-top:4px;color:#0a7d3c;background:var(--frbg);border-radius:6px;padding:5px 10px;font-weight:600;font-size:14px}
  html[data-theme="dark"] .qs .a{color:#5fcf89}
  .qs .anote{color:var(--muted);font-weight:400;font-size:12.5px}
  .hint{color:var(--muted);font-weight:400;font-size:.86em}
  .label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
  .hidden{display:none!important}
  .nores{color:var(--muted);padding:40px 0;text-align:center}
  /* mobile */
  #menuToggle{display:none}
  @media(max-width:820px){
    #sidebar{position:fixed;left:0;top:0;z-index:50;transform:translateX(-100%);transition:.25s}
    #sidebar.open{transform:translateX(0)}
    #menuToggle{display:inline-block}
    .inner,.topbar .tb{padding-left:16px;padding-right:16px}
  }
  .scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:40}
  .scrim.open{display:block}
</style>
</head>
<body>
<div class="wrap">
  <aside id="sidebar"></aside>
  <div class="scrim" id="scrim"></div>
  <div id="main">
    <div class="topbar">
      <div class="tb">
        <button class="iconbtn" id="menuToggle">☰</button>
        <input id="search" type="search" placeholder="搜索语法点 / Rechercher (中文或法语)…" autocomplete="off">
        <div class="chips" id="chips">
          <span class="chip on" data-l="ALL">全部</span>
          <span class="chip" data-l="A1">A1</span>
          <span class="chip" data-l="A2">A2</span>
          <span class="chip" data-l="B1">B1</span>
          <span class="chip" data-l="B2">B2</span>
          <span class="chip" data-l="C1">C1</span>
          <span class="chip" data-l="C2">C2</span>
        </div>
        <select id="voiceSel" class="ctl" title="法语语音 / Voix française"></select>
        <button class="iconbtn" id="voiceTest" title="试听 / Tester la voix">▶</button>
        <span class="spd" title="语速 / Vitesse">🐢<input id="rate" type="range" min="0.5" max="1.4" step="0.05" value="0.95">🐇<b id="rateVal">0.95×</b></span>
        <span class="tts-transport" id="ttsBar"><button class="iconbtn" id="ttsPause" title="暂停 / Pause" disabled>⏸</button><button class="iconbtn" id="ttsStop" title="停止 / Arrêter" disabled>⏹</button></span>
        <button class="iconbtn" id="themeBtn" title="深色/浅色">🌓</button>
      </div>
    </div>
    <div class="inner">
      <div class="hero">
        <h1>法语语法手册 · Grammaire française A1–C2</h1>
        <p>覆盖 A1–C2 全部核心语法点,每点含<strong>中法双语讲解 + 例句 + 易错点 + 练习</strong>;法语内容均可点 🔊 朗读(TTS)。</p>
        <p>Tous les points de grammaire essentiels du niveau A1 au C2, avec explications bilingues, exemples, pièges, exercices et synthèse vocale (🔊).</p>
        <p class="count" id="count"></p>
      </div>
      <div id="content"></div>
      <div class="nores hidden" id="nores">没有匹配的语法点 · Aucun résultat</div>
    </div>
  </div>
</div>
<script src="audio/manifest.js"></script>
<script>
/* ============================================================
   数据结构 · 每个语法点:
   { id, level:"A1|A2|B1|B2", cat:"中文分类", catFr, title, titleFr,
     zh:"中文讲解", fr:"explication FR",
     forms?:"<table>…</table>",
     ex:[{fr,zh}, …],
     tip?:"易错点(中文为主)" }
   例句法语里用 <b>…</b> 高亮重点结构。
   ============================================================ */
const A1 = [
  // ---------- 名词与冠词 ----------
  { id:"a1-genre", level:"A1", cat:"名词与冠词", catFr:"Noms et articles",
    title:"L'article défini", titleFr:"L'article défini · 定冠词",
    zh:"法语每个名词都有<strong>阴阳性</strong>,且冠词必须与名词的性、数一致。定冠词指<strong>特指/已知/独一无二</strong>的事物:阳性 <b>le</b>、阴性 <b>la</b>、元音或哑音 h 前缩为 <b>l'</b>、复数一律 <b>les</b>。",
    fr:"Tout nom français a un genre (masculin/féminin). L'article défini (le, la, l', les) s'emploie pour une chose précise, connue ou unique.",
    forms:"<table><tr><th>阳性 m.</th><th>阴性 f.</th><th>元音/h 前</th><th>复数 pl.</th></tr><tr><td>le livre</td><td>la table</td><td>l'ami, l'heure</td><td>les livres</td></tr></table>",
    ex:[
      {fr:"<b>Le</b> soleil brille.", zh:"太阳照耀着。(独一无二)"},
      {fr:"J'aime <b>la</b> musique.", zh:"我喜欢音乐。(泛指整类)"},
      {fr:"<b>Les</b> enfants jouent dans <b>le</b> parc.", zh:"孩子们在公园里玩。"}
    ],
    tip:"<b>易错:</b>名词的阴阳性必须连词一起记(记 <em>une table</em> 而不是单记 table)。à/de + le/les 要缩合:<em>à+le=au, à+les=aux, de+le=du, de+les=des</em>。" },

  { id:"a1-indefini", level:"A1", cat:"名词与冠词", catFr:"Noms et articles",
    title:"L'article indéfini", titleFr:"L'article indéfini · 不定冠词",
    zh:"不定冠词指<strong>非特指、初次提到、可数</strong>的事物:阳性 <b>un</b>、阴性 <b>une</b>、复数 <b>des</b>。",
    fr:"L'article indéfini (un, une, des) désigne une chose non précise, mentionnée pour la première fois.",
    ex:[
      {fr:"C'est <b>un</b> livre et <b>une</b> revue.", zh:"这是一本书和一本杂志。"},
      {fr:"Il y a <b>des</b> étudiants dans la classe.", zh:"教室里有一些学生。"}
    ],
    tip:"<b>易错:</b>否定句中 un/une/des 通常变 <b>de</b>:<em>Je n'ai pas <b>de</b> voiture.</em>(我没有车。)" },

  { id:"a1-pluriel", level:"A1", cat:"名词与冠词", catFr:"Noms et articles",
    title:"Le pluriel des noms", titleFr:"Le pluriel des noms · 名词复数",
    zh:"名词复数一般在词尾加 <b>-s</b>(不发音)。特殊:-au/-eau/-eu → 加 <b>-x</b>;-al → 改 <b>-aux</b>;以 -s/-x/-z 结尾不变。",
    fr:"On forme généralement le pluriel en ajoutant -s. Cas particuliers : -eau→-eaux, -al→-aux, etc.",
    forms:"<table><tr><th>规则</th><th>单数</th><th>复数</th></tr><tr><td>一般 +s</td><td>un ami</td><td>des amis</td></tr><tr><td>-eau +x</td><td>un château</td><td>des châteaux</td></tr><tr><td>-al→-aux</td><td>un journal</td><td>des journaux</td></tr><tr><td>-s/-x 不变</td><td>un bus</td><td>des bus</td></tr></table>",
    ex:[{fr:"Les <b>animaux</b> du zoo.", zh:"动物园的动物们。(animal→animaux)"}],
    tip:"<b>易错:</b>复数 -s 不发音,口语靠<strong>冠词</strong>(le/les、un/des)区分单复数。" },

  { id:"a1-partitif", level:"A1", cat:"名词与冠词", catFr:"Noms et articles",
    title:"L'article partitif", titleFr:"L'article partitif · 部分冠词",
    zh:"部分冠词表示<strong>不可数/不定量</strong>的一部分:阳性 <b>du</b>、阴性 <b>de la</b>、元音前 <b>de l'</b>。常用于食物、抽象概念。",
    fr:"L'article partitif (du, de la, de l') exprime une quantité indéterminée d'une chose non comptable.",
    ex:[
      {fr:"Je bois <b>du</b> café et <b>de l'</b>eau.", zh:"我喝(一些)咖啡和水。"},
      {fr:"Tu as <b>de la</b> chance !", zh:"你真走运!"}
    ],
    tip:"<b>易错:</b>否定后及数量词后用 <b>de</b>:<em>pas <b>de</b> café、beaucoup <b>de</b> café</em>。对比:<em>J'aime <b>le</b> café</em>(泛指,用定冠词)vs <em>Je bois <b>du</b> café</em>(部分量)。" },

  // ---------- 代词与 être/avoir ----------
  { id:"a1-sujets", level:"A1", cat:"主语代词与系动词", catFr:"Pronoms sujets, être/avoir",
    title:"Les pronoms sujets", titleFr:"Les pronoms sujets · 主语人称代词",
    zh:"主语代词:<b>je</b>(我)、<b>tu</b>(你,熟人)、<b>il/elle/on</b>(他/她/我们口语)、<b>nous</b>(我们)、<b>vous</b>(您/你们)、<b>ils/elles</b>(他们/她们)。",
    fr:"Les pronoms sujets remplacent le sujet. « on » = « nous » à l'oral ; « vous » est aussi la forme de politesse.",
    ex:[
      {fr:"<b>Vous</b> parlez français ?", zh:"您说法语吗?(礼貌)"},
      {fr:"<b>On</b> va au cinéma.", zh:"我们去看电影。(口语 on=nous)"}
    ],
    tip:"<b>易错:</b>je 在元音前缩为 j'(<em>j'habite</em>)。on 的动词永远用<strong>第三人称单数</strong>。" },

  { id:"a1-etre", level:"A1", cat:"主语代词与系动词", catFr:"Pronoms sujets, être/avoir",
    title:"Le verbe « être »", titleFr:"Le verbe « être » · 动词「是」",
    zh:"être(是)是最重要的动词之一,用于身份、国籍、职业、状态、形容词描述。",
    fr:"« Être » sert à exprimer l'identité, la nationalité, la profession, l'état.",
    forms:"<table><tr><td>je suis</td><td>nous sommes</td></tr><tr><td>tu es</td><td>vous êtes</td></tr><tr><td>il/elle est</td><td>ils/elles sont</td></tr></table>",
    ex:[
      {fr:"Je <b>suis</b> étudiant.", zh:"我是学生。(职业不加冠词)"},
      {fr:"Nous <b>sommes</b> français.", zh:"我们是法国人。"}
    ],
    tip:"<b>易错:</b>表职业/国籍时形容词或名词<strong>不加冠词</strong>:<em>Il est médecin.</em>(他是医生。)" },

  { id:"a1-avoir", level:"A1", cat:"主语代词与系动词", catFr:"Pronoms sujets, être/avoir",
    title:"Le verbe « avoir »", titleFr:"Le verbe « avoir » · 动词「有」",
    zh:"avoir(有)表示拥有、年龄,也是大多数复合时态的助动词(见 A2 复合过去时)。",
    fr:"« Avoir » exprime la possession, l'âge, et sert d'auxiliaire aux temps composés.",
    forms:"<table><tr><td>j'ai</td><td>nous avons</td></tr><tr><td>tu as</td><td>vous avez</td></tr><tr><td>il/elle a</td><td>ils/elles ont</td></tr></table>",
    ex:[
      {fr:"J'<b>ai</b> vingt ans.", zh:"我二十岁。(年龄用 avoir,不用 être!)"},
      {fr:"Elle <b>a</b> deux frères.", zh:"她有两个兄弟。"}
    ],
    tip:"<b>易错:</b>年龄用 avoir 不用 être——中文「我<em>是</em>20岁」≠ 法语,法语是「我<em>有</em>20岁」。" },

  { id:"a1-cest-ilya", level:"A1", cat:"主语代词与系动词", catFr:"Pronoms sujets, être/avoir",
    title:"« c'est » et « il y a »", titleFr:"« c'est » / « il y a » · 这是/有",
    zh:"<b>c'est</b>(这是)用于指认、介绍;<b>il y a</b>(有)表示存在。复数 <em>ce sont</em>。",
    fr:"« C'est » présente ou identifie ; « il y a » indique l'existence (invariable).",
    ex:[
      {fr:"<b>C'est</b> mon ami Paul.", zh:"这是我的朋友保罗。"},
      {fr:"<b>Il y a</b> un problème.", zh:"有一个问题。"},
      {fr:"Dans la ville, <b>il y a</b> beaucoup de musées.", zh:"城里有很多博物馆。"}
    ],
    tip:"<b>易错:</b>il y a 永远不变(没有复数 *il y ont*)。c'est vs il est:<em>C'est un médecin</em>(c'est+冠词+名词)/ <em>Il est médecin</em>(il est+职业)。" },

  // ---------- 现在时 ----------
  { id:"a1-present-er", level:"A1", cat:"直陈式现在时", catFr:"Le présent de l'indicatif",
    title:"Le présent : verbes en -ER", titleFr:"现在时:第一组动词 -ER",
    zh:"第一组动词(占 90%)去掉 -er,加词尾 <b>-e, -es, -e, -ons, -ez, -ent</b>。现在时表示当前、习惯、普遍真理。",
    fr:"1er groupe (-er) : on retire -er et on ajoute les terminaisons. Le présent exprime une action actuelle, habituelle ou générale.",
    forms:"<table><tr><th>parler 说</th><th></th></tr><tr><td>je parle</td><td>nous parlons</td></tr><tr><td>tu parles</td><td>vous parlez</td></tr><tr><td>il parle</td><td>ils parlent</td></tr></table>",
    ex:[
      {fr:"Nous <b>habitons</b> à Paris.", zh:"我们住在巴黎。"},

  "a2-imparfait": [ {q:"Quand j'___ (être) jeune, j'habitais à la campagne. <span class=hint>提示:未完成过去时,状态</span>", a:"Quand j'étais jeune, j'habitais à la campagne.", note:"être 不规则词干 ét-。"}, {q:"Tous les dimanches, nous ___ (manger) chez ma grand-mère. <span class=hint>提示:过去的习惯</span>", a:"Tous les dimanches, nous mangions chez ma grand-mère.", note:"词干 mange- + -ions。"} ],
  "a2-pc-vs-imp": [ {q:"Je ___ (lire) quand on ___ (frapper) à la porte. <span class=hint>提示:背景 + 突发</span>", a:"Je lisais quand on a frappé à la porte.", note:"背景→imparfait;突发→passé composé。"}, {q:"Hier, il ___ (faire) froid, alors je ___ (rester) à la maison. <span class=hint>提示:天气描写 + 完成动作</span>", a:"Hier, il faisait froid, alors je suis resté à la maison.", note:"天气→imparfait;完成动作→passé composé(être)。"} ],
  "a2-futur-simple": [ {q:"Demain, nous ___ (être) en vacances. <span class=hint>提示:简单将来时,词干 ser-</span>", a:"Demain, nous serons en vacances."}, {q:"L'année prochaine, j'___ (aller) au Japon. <span class=hint>提示:词干 ir-</span>", a:"L'année prochaine, j'irai au Japon."} ],
  "a2-cod": [ {q:"Tu connais cette chanson ? — Oui, je ___ connais. <span class=hint>提示:替代 cette chanson</span>", a:"Oui, je la connais.", note:"阴性单数直接宾语 → la,置于动词前。"}, {q:"Vous regardez les enfants ? — Oui, je ___ regarde. <span class=hint>提示:替代 les enfants</span>", a:"Oui, je les regarde."} ],
  "a2-coi": [ {q:"Tu écris à ta sœur ? — Oui, je ___ écris. <span class=hint>提示:à + 人</span>", a:"Oui, je lui écris.", note:"à + 单数人 → lui,不分男女。"}, {q:"Il parle à ses collègues ? — Oui, il ___ parle. <span class=hint>提示:à + 复数人</span>", a:"Oui, il leur parle.", note:"à + 复数人 → leur(无 -s)。"} ],
  "a2-en": [ {q:"Tu bois de l'eau ? — Oui, j'___ bois. <span class=hint>提示:替代部分冠词宾语</span>", a:"Oui, j'en bois."}, {q:"Combien de voitures as-tu ? — J'___ ai deux. <span class=hint>提示:数量,en 保留数词</span>", a:"J'en ai deux.", note:"带数量时数词 deux 保留。"} ],
  "a2-y": [ {q:"Tu vas au cinéma ce soir ? — Oui, j'___ vais. <span class=hint>提示:à + 地点</span>", a:"Oui, j'y vais."}, {q:"Elle pense à ses vacances → Elle ___ pense. <span class=hint>提示:à + 物</span>", a:"Elle y pense.", note:"penser à + 物 → y;à + 人则用 lui。"} ],
  "a2-pronominaux": [ {q:"Le matin, je ___ (se lever) à six heures. <span class=hint>提示:代词式动词现在时</span>", a:"Le matin, je me lève à six heures.", note:"反身代词 me 跟主语一致。"}, {q:"Hier, elle ___ (se coucher) très tard. <span class=hint>提示:复合过去时用 être</span>", a:"Hier, elle s'est couchée très tard.", note:"用 être,过去分词配合主语 → couchée。"} ],
  "a2-imperatif": [ {q:"(à un ami) ___ (parler) plus lentement ! <span class=hint>提示:tu 命令式,-er 去 -s</span>", a:"Parle plus lentement !", note:"第一组动词 tu 命令式去 -s。"}, {q:"(à un ami) Tu es fatigué ? ___ (se reposer) ! <span class=hint>提示:肯定命令,te → toi</span>", a:"Repose-toi !", note:"肯定命令代词后置,te → toi。"} ],
  "a2-comparatif": [ {q:"Cette voiture est ___ chère ___ l'autre. (= +) <span class=hint>提示:优等比较</span>", a:"Cette voiture est plus chère que l'autre."}, {q:"Ton idée est ___ que la mienne. (bon, = +) <span class=hint>提示:bon 的优等比较不规则</span>", a:"Ton idée est meilleure que la mienne.", note:"bon → meilleur(e),不能说 plus bon。"} ],
  "a2-superlatif": [ {q:"C'est ___ grand monument de la ville. (= 最) <span class=hint>提示:le plus + 形容词</span>", a:"C'est le plus grand monument de la ville."}, {q:"Paris est ___ belle ville ___ monde. (= 世界上最美) <span class=hint>提示:后置冠词重复;『在…中』用 de</span>", a:"Paris est la plus belle ville du monde.", note:"du monde = de + le monde。"} ],
  "a2-qui-que": [ {q:"C'est une amie ___ travaille avec moi. <span class=hint>提示:从句缺主语</span>", a:"C'est une amie qui travaille avec moi.", note:"后接动词 → qui。"}, {q:"Voici le gâteau ___ ma mère a préparé. <span class=hint>提示:从句缺直接宾语</span>", a:"Voici le gâteau que ma mère a préparé.", note:"后接主语 → que。"} ],
  "a2-ou-relatif": [ {q:"Voici la maison ___ j'ai grandi. <span class=hint>提示:地点</span>", a:"Voici la maison où j'ai grandi."}, {q:"Je me souviens du jour ___ nous nous sommes rencontrés. <span class=hint>提示:时间也用它</span>", a:"Je me souviens du jour où nous nous sommes rencontrés.", note:"表时间的「那天」用 où。"} ],
  "a2-quantite": [ {q:"Dans cette ville, il y a ___ touristes. (beaucoup) <span class=hint>提示:数量副词 + de</span>", a:"Dans cette ville, il y a beaucoup de touristes.", note:"beaucoup de(无冠词),不是 beaucoup des。"}, {q:"Je voudrais ___ eau, s'il vous plaît. (une bouteille) <span class=hint>提示:量词 + de</span>", a:"Je voudrais une bouteille d'eau, s'il vous plaît.", note:"元音前缩 d'。"} ],
  "a2-temps-prep": [ {q:"J'habite à Lyon ___ trois ans. (自三年前至今) <span class=hint>提示:持续到现在 + 现在时</span>", a:"J'habite à Lyon depuis trois ans.", note:"depuis + 现在时(中文「了」,法语现在时)。"}, {q:"Le film commence ___ dix minutes. (十分钟后) <span class=hint>提示:将来「…之后」</span>", a:"Le film commence dans dix minutes."} ],
  "a2-politesse": [ {q:"Au café : ___ un thé, s'il vous plaît. (vouloir, je,礼貌) <span class=hint>提示:条件式</span>", a:"Je voudrais un thé, s'il vous plaît.", note:"je voudrais 比 je veux 更礼貌。"}, {q:"___ m'aider, s'il vous plaît ? (pouvoir, vous,礼貌请求) <span class=hint>提示:条件式倒装</span>", a:"Pourriez-vous m'aider, s'il vous plaît ?"} ],
  "b1-pqp": [ {q:"Quand je suis arrivé à la gare, le train ___ déjà ___ (partir). (到达前火车已开走)", a:"Quand je suis arrivé à la gare, le train était déjà parti."}, {q:"Elle nous a raconté ce qu'elle ___ (voir) la veille. (转述之前看到的)", a:"Elle nous a raconté ce qu'elle avait vu la veille."} ],
  "b1-cond-present": [ {q:"___ (vouloir, je) un café, s'il vous plaît. (礼貌)", a:"Je voudrais un café, s'il vous plaît.", note:"futur 词干 voudr- + imparfait 词尾。"}, {q:"Si j'avais de l'argent, j'___ (acheter) une maison. (假设的结果)", a:"Si j'avais de l'argent, j'achèterais une maison."}, {q:"Selon la presse, le ministre ___ (être) malade. (未经证实的传闻)", a:"Selon la presse, le ministre serait malade."} ],
  "b1-cond-passe": [ {q:"J'___ (devoir) partir plus tôt. (后悔:本该)", a:"J'aurais dû partir plus tôt."}, {q:"Si tu m'avais prévenu, je ___ (venir) t'aider. (过去未实现)", a:"Si tu m'avais prévenu, je serais venu t'aider.", note:"venir 用 être,配合主语。"} ],
  "b1-subj-present": [ {q:"Il faut que tu ___ (faire) tes devoirs ce soir. (必要→虚拟)", a:"Il faut que tu fasses tes devoirs ce soir.", note:"faire 不规则:fasse。"}, {q:"Je veux que vous ___ (être) à l'heure demain. (意愿→虚拟)", a:"Je veux que vous soyez à l'heure demain.", note:"être 不规则:soyez。"} ],
  "b1-subj-declencheurs": [ {q:"Bien qu'il ___ (être) fatigué, il continue. (bien que→虚拟)", a:"Bien qu'il soit fatigué, il continue."}, {q:"J'espère qu'il ___ (venir) à la fête. (espérer que→直陈式!)", a:"J'espère qu'il viendra à la fête.", note:"espérer que 接直陈,不是虚拟。"}, {q:"Je reste jusqu'à ce que tu ___ (revenir). (jusqu'à ce que→虚拟)", a:"Je reste jusqu'à ce que tu reviennes."} ],
  "b1-si": [ {q:"Si j'___ (avoir) le temps demain, je ___ (venir) te voir. (①真实:现在时→将来时)", a:"Si j'ai le temps demain, je viendrai te voir."}, {q:"Si j'___ (être) riche, je ___ (voyager) partout. (②现在非真实:未完成→条件式现在)", a:"Si j'étais riche, je voyagerais partout.", note:"si 后绝不用条件式。"}, {q:"Si j'___ (savoir) la vérité, je ___ (ne rien dire). (③过去非真实:愈过去→条件式过去)", a:"Si j'avais su la vérité, je n'aurais rien dit."} ],
  "b1-discours-indirect": [ {q:"Il dit : « Je suis fatigué. » → Il dit ___ il est fatigué. (陈述句)", a:"Il dit qu'il est fatigué."}, {q:"Elle me demande : « Tu viens ? » → Elle me demande ___ je viens. (是非问)", a:"Elle me demande si je viens."}, {q:"« Qu'est-ce que tu fais ? » → Il demande ___ je fais. (特殊疑问)", a:"Il demande ce que je fais.", note:"qu'est-ce que → ce que。"} ],
  "b1-passif": [ {q:"La police a arrêté le voleur. → Le voleur ___ (arrêter,被动) par la police. (复合过去时被动)", a:"Le voleur a été arrêté par la police."}, {q:"Tout le monde aime ce professeur. → Ce professeur est aimé ___ tout le monde. (情感用 de)", a:"Ce professeur est aimé de tout le monde.", note:"感受/状态常用 de 而非 par。"} ],
  "b1-double-pronoms": [ {q:"Il me donne le livre. → Il ___ donne. (me + le)", a:"Il me le donne."}, {q:"Tu donnes les clés à Paul ? → Tu ___ donnes ? (les + lui)", a:"Tu les lui donnes ?"}, {q:"Donne le livre à moi ! → ___ ! (肯定命令式)", a:"Donne-le-moi !", note:"肯定命令语序:le 在 moi 之前。"} ],
  "b1-possessifs-pron": [ {q:"C'est ta voiture ? — Non, c'est ___ (à elle). (她的)", a:"Non, c'est la sienne.", note:"配合 voiture 阴性。"}, {q:"Je préfère mon vélo ___ (à + le tien). (à 与冠词缩合)", a:"Je préfère mon vélo au tien.", note:"à + le tien → au tien。"} ],
  "b1-demonstratifs-pron": [ {q:"Quel livre veux-tu ? — ___ (celui + de) Marie. (这个 + 所属)", a:"Celui de Marie."}, {q:"___ (ceux + qui) veulent partir peuvent le faire. (那些 + 从句)", a:"Ceux qui veulent partir peuvent le faire."} ],
  "b1-dont": [ {q:"Voici le livre ___ je t'ai parlé. (parler de → ?)", a:"Voici le livre dont je t'ai parlé."}, {q:"C'est l'outil ___ j'ai besoin. (avoir besoin de → ?)", a:"C'est l'outil dont j'ai besoin."}, {q:"Je connais un homme ___ la voiture est rouge. (所属:他的车)", a:"Je connais un homme dont la voiture est rouge.", note:"语序:dont + 主语 + 动词。"} ],
  "b1-gerondif": [ {q:"Il chante ___ (travailler). (同时:一边…一边)", a:"Il chante en travaillant.", note:"en + 现在分词。"}, {q:"___ (chercher) bien, tu trouveras. (条件:好好找的话)", a:"En cherchant bien, tu trouveras."} ],
  "b1-negations": [ {q:"Je bois seulement de l'eau. → Je ___ bois ___ de l'eau. (ne…que,冠词不变!)", a:"Je ne bois que de l'eau.", note:"ne…que 是限制,保留 de l'eau。"}, {q:"Il y a quelqu'un ? — Non, il ___ y a ___. (没有人)", a:"Non, il n'y a personne."} ],
  "b1-connecteurs-base": [ {q:"Je révise beaucoup ___ j'ai un examen lundi. (原因)", a:"Je révise beaucoup parce que j'ai un examen lundi."}, {q:"Je t'explique tout ___ tu ___ (comprendre). (目的:pour que→虚拟)", a:"Je t'explique tout pour que tu comprennes.", note:"pour que + 虚拟式。"} ],
  "b2-subj-passe": [ {q:"Je suis ravi que vous ___ (terminer) le projet avant la réunion. (已完成→虚拟式过去)", a:"Je suis ravi que vous ayez terminé le projet avant la réunion."}, {q:"Bien qu'elle ___ (partir) tôt, elle a manqué son train. (已发生→虚拟式过去)", a:"Bien qu'elle soit partie tôt, elle a manqué son train.", note:"partir 用 être,分词配合阴性。"} ],
  "b2-mode-choix": [ {q:"Je suis sûr qu'il ___ (avoir) raison. (肯定→直陈)", a:"Je suis sûr qu'il a raison."}, {q:"Je ne crois pas qu'il ___ (avoir) raison. (否定→虚拟)", a:"Je ne crois pas qu'il ait raison."} ],
  "b2-concordance": [ {q:"« Je finirai demain. » → Il a dit qu'il ___ . (主句过去→后移 + 时间词)", a:"Il a dit qu'il finirait le lendemain.", note:"futur → conditionnel;demain → le lendemain。"}, {q:"« J'ai vu ce film hier. » → Elle a expliqué qu'elle ___ . (后移 + 时间词)", a:"Elle a expliqué qu'elle avait vu ce film la veille.", note:"passé composé → plus-que-parfait;hier → la veille。"} ],
  "b2-participe-present": [ {q:"Remplacez la relative : Les candidats <b>qui possèdent</b> un diplôme… → Les candidats ___ un diplôme… (现在分词)", a:"Les candidats possédant un diplôme.", note:"qui possèdent → possédant。"}, {q:"« Comme le magasin était fermé, nous sommes rentrés. » → proposition participiale : ___ , nous sommes rentrés. (自带主语)", a:"Le magasin étant fermé, nous sommes rentrés."} ],
  "b2-se-faire": [ {q:"On lui a volé sa voiture. → Il ___ sa voiture. (se faire,强调受害者)", a:"Il s'est fait voler sa voiture.", note:"se faire 中 fait 永不配合。"}, {q:"On a refusé l'accès à cette journaliste. → Cette journaliste ___ l'accès. (se voir + 原形)", a:"Cette journaliste s'est vu refuser l'accès.", note:"vu 不配合。"} ],
  "b2-relatifs-composes": [ {q:"C'est un collègue. Je travaille avec lui. → C'est le collègue ___ je travaille. (介词+指人)", a:"C'est le collègue avec qui je travaille.", note:"介词后指人优先用 qui。"}, {q:"Voilà l'objectif. Je tiens à cet objectif. → Voilà l'objectif ___ je tiens. (tenir à + 物)", a:"Voilà l'objectif auquel je tiens.", note:"à + lequel → auquel。"}, {q:"C'est la rivière. J'habite au bord de cette rivière. → C'est la rivière ___ j'habite. (短语以 de 结尾)", a:"C'est la rivière au bord de laquelle j'habite.", note:"au bord de → de laquelle,不用 dont。"} ],
  "b2-mise-relief": [ {q:"Paul a cassé le vase. → ___ a cassé le vase. (强调主语→c'est…qui)", a:"C'est Paul qui a cassé le vase."}, {q:"Je veux la justice. → ___ , c'est la justice. (ce que…, c'est…)", a:"Ce que je veux, c'est la justice."} ],
  "b2-nominalisation": [ {q:"Les températures ont baissé. → ___ des températures. (动词→名词)", a:"La baisse des températures.", note:"baisser → la baisse。"}, {q:"Le ministre a démissionné. → ___ du ministre. (-ion)", a:"La démission du ministre.", note:"démissionner → la démission。"} ],
  "b2-futur-anterieur": [ {q:"Quand tu ___ (lire) ce livre, tu me le rendras. (从句先完成→先将来)", a:"Quand tu auras lu ce livre, tu me le rendras."}, {q:"Dès qu'elle ___ (rentrer), nous dînerons. (先完成,être 助动词)", a:"Dès qu'elle sera rentrée, nous dînerons.", note:"être 简单将来 + 分词配合阴性。"} ],
  "b2-opposition-concession": [ {q:"___ il ___ (être) très qualifié, il n'a pas obtenu le poste. (尽管→bien que+虚拟)", a:"Bien qu'il soit très qualifié, il n'a pas obtenu le poste."}, {q:"___ ses efforts, il a échoué. (malgré + 名词)", a:"Malgré ses efforts, il a échoué.", note:"malgré 后跟名词,不能跟句子。"}, {q:"Il ___ crier, personne ne l'entend. (avoir beau + 原形)", a:"Il a beau crier, personne ne l'entend."} ],
  "b2-cause-consequence": [ {q:"Il a ___ insisté ___ j'ai fini par accepter. (如此…以致→tellement…que)", a:"Il a tellement insisté que j'ai fini par accepter."}, {q:"Le match est reporté ___ fortes pluies. (由于+名词,正式)", a:"Le match est reporté en raison des fortes pluies.", note:"en raison de + les → des。"} ],
  "b2-but-condition": [ {q:"Il économise ___ (pouvoir) acheter une maison. (同主语→afin de+原形)", a:"Il économise afin de pouvoir acheter une maison."}, {q:"Le prof répète ___ tous ___ (comprendre). (异主语→afin que+虚拟)", a:"Le prof répète afin que tous comprennent."}, {q:"___ il ___ (avoir) un imprévu, appelle-moi. (万一→au cas où+条件式)", a:"Au cas où il y aurait un imprévu, appelle-moi.", note:"au cas où 后接条件式。"} ],
  "b2-accord-pp": [ {q:"Les lettres que j'ai ___ (écrire) sont sur la table. (COD 提前→配合)", a:"Les lettres que j'ai écrites sont sur la table.", note:"COD 阴性复数提前 → écrites。"}, {q:"Elle s'est ___ (laver) les mains. (后有直接宾语→不配合)", a:"Elle s'est lavé les mains.", note:"COD「les mains」在后 → 不配合。"}, {q:"Elles se sont ___ (parler) pendant des heures. (se 是间接宾语)", a:"Elles se sont parlé pendant des heures.", note:"se = COI(parler à)→ 不配合。"} ],
  "b2-registres": [ {q:"Au registre courant : « Je suis crevé. » → « Je suis ___. » (口语→通用)", a:"Je suis fatigué.", note:"crevé → fatigué。"}, {q:"Au registre soutenu : « Tu peux me filer un truc ? » → « Pourriez-vous me donner ___ ? » (口语→正式)", a:"Pourriez-vous me donner un élément ?", note:"un truc → un élément。"} ],
  "b2-modalisation": [ {q:"Nuancez : « La situation s'améliore. » → ___ la situation s'améliore. (il semblerait que)", a:"Il semblerait que la situation s'améliore."}, {q:"Atténuez : « C'est faux. » → « Cela ___ discutable. » (避免绝对化)", a:"Cela paraît discutable."} ],
  "b2-adj-sens": [ {q:"Placez <b>ancien</b> (= 以前的) : C'est mon ___ professeur ___ de français. (前置)", a:"C'est mon ancien professeur de français.", note:"前置 ancien = 以前的。"}, {q:"Placez <b>dernière</b> (= 上周) : Je l'ai vu la ___ semaine ___. (后置)", a:"Je l'ai vu la semaine dernière.", note:"后置 dernière = 上(周)。"} ],
  "c1-passe-simple": [ {q:"Mettez au passé simple : Il est entré, a salué et s'est assis. → Il ___ .", a:"Il entra, salua et s'assit."}, {q:"Mettez au passé simple : Victor Hugo est né en 1802 et est mort en 1885. → Victor Hugo ___ en 1802 et ___ en 1885.", a:"Victor Hugo naquit en 1802 et mourut en 1885."} ],
  "c1-subj-imparfait": [ {q:"Réécrivez en français moderne : Il fallait qu'il <b>partît</b> sur-le-champ. → Il fallait qu'il ___ sur-le-champ.", a:"Il fallait qu'il parte sur-le-champ."}, {q:"Réécrivez en français moderne : Je craignais qu'elle ne <b>vînt</b> pas. → Je craignais qu'elle ne ___ pas.", a:"Je craignais qu'elle ne vienne pas.", note:"文学 vînt → 现代 vienne。"} ],
  "c1-cond-2e": [ {q:"Réécrivez en français courant : Il <b>eût aimé</b> vous connaître. → Il ___ vous connaître.", a:"Il aurait aimé vous connaître."}, {q:"Réécrivez en français courant : Il <b>eût fallu</b> agir plus tôt. → Il ___ agir plus tôt.", a:"Il aurait fallu agir plus tôt.", note:"文学 eût fallu = 现代 aurait fallu。"} ],
  "c1-inversion": [ {q:"Faites l'inversion : Peut-être / il / viendra / demain. → ___ demain.", a:"Peut-être viendra-t-il demain."}, {q:"Complétez (刚…就) : À peine ___ sorti qu'il se mit à pleuvoir. (il / être)", a:"À peine était-il sorti qu'il se mit à pleuvoir."}, {q:"Inversion après <b>aussi</b> (=因此) : Il pleuvait ; aussi ___ restés. (nous / être)", a:"Il pleuvait ; aussi sommes-nous restés."} ],
  "c1-dislocation": [ {q:"Disloquez le COD (口语) : J'ai adoré ce film. → Ce film, je ___ .", a:"Ce film, je l'ai adoré."}, {q:"Mise en relief avec <b>ce qui… c'est</b> : L'effort compte. → ___ compte, ___ l'effort.", a:"Ce qui compte, c'est l'effort."} ],
  "c1-concession-indefinie": [ {q:"Complétez (无论什么,+虚拟) : ___ tu fasses, je te soutiens.", a:"Quoi que tu fasses, je te soutiens."}, {q:"Complétez (无论…如何,quel 配合) : ___ le résultat, restons calmes.", a:"Quel que soit le résultat, restons calmes.", note:"quel que 分写,与 résultat 配合。"}, {q:"Complétez (无论多难,+虚拟) : ___ difficile que ce soit, persévère. (si)", a:"Si difficile que ce soit, persévère."} ],
  "c1-hypothese-sans-si": [ {q:"Remplacez « si » par un gérondif : Si tu travaillais davantage, tu réussirais. → ___ davantage, tu réussirais.", a:"En travaillant davantage, tu réussirais."}, {q:"Complétez avec <b>au cas où</b> (+条件式!) : ___ tu ___ faim, il y a du pain. (avoir)", a:"Au cas où tu aurais faim, il y a du pain.", note:"au cas où 接条件式。"} ],
  "c1-ne-expletif": [ {q:"Ajoutez le <b>ne</b> explétif : Je crains qu'il ___ soit trop tard.", a:"Je crains qu'il ne soit trop tard.", note:"此 ne 非否定。"}, {q:"Ajoutez le <b>ne</b> explétif : Il est plus malin qu'on ___ le pense.", a:"Il est plus malin qu'on ne le pense."} ],
  "c1-accord-avance": [ {q:"Accordez (施动者→配合) : Les artistes que j'ai ___ chanter. (voir)", a:"Les artistes que j'ai vus chanter.", note:"他们在唱→配合。"}, {q:"Accordez ou non (被动作→不配合) : La chanson que j'ai ___ chanter. (entendre)", a:"La chanson que j'ai entendu chanter.", note:"歌是被唱→不配合。"}, {q:"Accordez ou non (COD = en) : Des fautes ? J'en ai ___ . (faire)", a:"Des fautes ? J'en ai fait."} ],
  "c1-connecteurs-soutenus": [ {q:"Reliez avec <b>d'autant plus… que</b> : Il est ___ déçu ___ il espérait gagner.", a:"Il est d'autant plus déçu qu'il espérait gagner."}, {q:"Complétez avec <b>or</b> : Tous le savaient. ___ , personne n'agit.", a:"Tous le savaient. Or, personne n'agit."} ],
  "c1-apres-que": [ {q:"Complétez (直陈式!) : Après qu'il ___ (partir, passé composé), j'ai rangé.", a:"Après qu'il est parti, j'ai rangé.", note:"après que 接直陈式。"}, {q:"Complétez (avant que → 虚拟) : Range avant qu'il ___ (arriver).", a:"Range avant qu'il arrive."} ],
  "c1-impersonnelles": [ {q:"Complétez avec <b>il convient de</b> : ___ rester prudent.", a:"Il convient de rester prudent."}, {q:"Complétez avec <b>force est de constater que</b> : ___ rien n'a changé.", a:"Force est de constater que rien n'a changé."} ],
  "c1-adj-verbal": [ {q:"Adjectif verbal (配合) : une journée ___ (fatiguer)", a:"une journée fatigante", note:"形容词→配合,拼 -gant。"}, {q:"Participe présent (不变,-gu-) : ___ tout le monde, il partit. (fatiguer)", a:"Fatiguant tout le monde, il partit.", note:"分词带宾语→不变,拼 -guant。"} ],
  "c2-passe-anterieur": [ {q:"改写成文学语体(先过去时 + 简单过去时) : « Quand il a eu fini son discours, il est sorti. »", a:"Quand il eut fini son discours, il sortit."}, {q:"改为先过去时 + 简单过去时 : « Dès qu'elle était partie, le silence est retombé. »", a:"Dès qu'elle fut partie, le silence retomba."} ],
  "c2-concordance-litteraire": [ {q:"改写成文学呼应(虚拟式未完成过去) : « Je voulais qu'il vienne. »", a:"Je voulais qu'il vînt."}, {q:"改写成文学呼应(表「在前」用虚拟式愈过去) : « Bien qu'il ait plu, ils sortirent. »", a:"Bien qu'il eût plu, ils sortirent."} ],
  "c2-concession-soutenue": [ {q:"« Quand bien même il ___ (pleuvoir), je sortirais. » (即便)", a:"Quand bien même il pleuvrait, je sortirais.", note:"quand bien même + 条件式。"}, {q:"« Tout intelligent qu'il ___ (être), il se trompe. » (强调事实→直陈)", a:"Tout intelligent qu'il est, il se trompe.", note:"tout… que + 直陈式。"}, {q:"« ___ (n'être) son aide, j'aurais échoué. » (若非)", a:"N'était son aide, j'aurais échoué."} ],
  "c2-subj-fin": [ {q:"« Non qu'il ___ (être) bête, mais il est distrait. » (并非)", a:"Non qu'il soit bête, mais il est distrait.", note:"non que + 虚拟式。"}, {q:"« Parle fort de sorte qu'on t'___ (entendre). » (目的)", a:"Parle fort de sorte qu'on t'entende.", note:"de sorte que 表目的→虚拟。"}, {q:"« C'est le seul qui ___ (savoir) la vérité. » (主观→虚拟)", a:"C'est le seul qui sache la vérité."} ],
  "c2-accord-extreme": [ {q:"« Les rois qui se sont ___ (succéder). » (se = à qn)", a:"Les rois qui se sont succédé.", note:"se = 间接宾语 → 不配合。"}, {q:"« Veuillez trouver ___ (ci-joint) la facture. » (置于名词前)", a:"Veuillez trouver ci-joint la facture.", note:"ci-joint 前置 → 不配合。"}, {q:"« Les sommes que ce projet a ___ (coûter). » (本义/数量)", a:"Les sommes que ce projet a coûté.", note:"coûté 本义 → 不配合。"} ],
  "c2-inversion-style": [ {q:"主语后置 : « La mer s'étendait au loin. » → « Au loin ___ . »", a:"Au loin s'étendait la mer."}, {q:"主语后置 : « Sur la colline, un château se dressait. »", a:"Sur la colline se dressait un château."} ],
  "c2-ellipse": [ {q:"用省略式改写 : « Il est inutile d'insister. » → « ___ insister. »", a:"Inutile d'insister."}, {q:"省略可复原的动词 : « Les uns riaient ; les autres pleuraient, en larmes. » → « Les uns riaient ; les autres, ___ . »", a:"Les uns riaient ; les autres, en larmes."} ],
  "c2-conjecture": [ {q:"« On sonne — ce ___ (être,推测性将来时) le facteur. » (多半是)", a:"On sonne — ce sera le facteur.", note:"futur de conjecture = 大概。"}, {q:"« Selon la presse, le bilan ___ (s'élever,新闻条件式) à dix morts. » (据称)", a:"Selon la presse, le bilan s'élèverait à dix morts.", note:"条件式 = 未经证实。"} ],
  "c2-rection": [ {q:"« Tu me ___ (manquer). » (我想你)", a:"Tu me manques.", note:"manquer à:主宾与中文相反。"}, {q:"« Elle ___ (jouer) du piano et ___ (jouer) au tennis. »", a:"Elle joue du piano et joue au tennis.", note:"jouer de 乐器 / jouer à 运动。"}, {q:"« Il ___ (tenir) de son père. » (像)", a:"Il tient de son père.", note:"tenir de = 像;tenir à = 在乎。"} ],
  "c2-cause-niee": [ {q:"« Il a refusé, non qu'il ___ (être) timide, mais par principe. » (并非因为)", a:"Il a refusé, non qu'il soit timide, mais par principe.", note:"non que + 虚拟式。"}, {q:"补全 : « ___ je n'aime pas, ___ je n'ai pas le temps. » (不是…而是…)", a:"Ce n'est pas que je n'aime pas, c'est que je n'ai pas le temps."} ],
  "c2-cohesion": [ {q:"« ___ , la décision est prise. » (无论如何)", a:"Quoi qu'il en soit, la décision est prise."}, {q:"« ___ , il avait raison. » (就此事而言)", a:"En l'occurrence, il avait raison."}, {q:"« Le projet coûte cher ; ___ , il est nécessaire. » (话虽如此)", a:"Le projet coûte cher ; cela étant, il est nécessaire."} ],
  "c2-exclamation": [ {q:"« ___ temps perdu ! » (多么多…!表数量)", a:"Que de temps perdu !"}, {q:"« Il est plus âgé que je ___ le croyais. » (比较从句的赘词 ne)", a:"Il est plus âgé que je ne le croyais."} ],
};

const GRAMMAR = [...A1, ...A2, ...B1, ...B2, ...C1, ...C2];

/* ===================== 渲染 ===================== */
const $ = s => document.querySelector(s);
const content = $("#content"), sidebar = $("#sidebar");
let activeLevel = "ALL", query = "";

function escAttr(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function stripTags(s){return String(s).replace(/<[^>]+>/g,'');}
function tts(fr){const t=stripTags(fr);return t?`<button class="tts" data-tts="${escAttr(t)}" title="朗读法语 / Écouter">🔊</button>`:"";}
function cardHTML(g){
  const forms = g.forms ? `<div class="forms">${g.forms}</div>` : "";
  const tip = g.tip ? `<div class="tip">${g.tip}</div>` : "";
  const ex = (g.ex||[]).map(e=>`<li><div class="fr">${tts(e.fr)} ${e.fr}</div><div class="zh">${e.zh}</div></li>`).join("");
  const pr = (typeof PRACTICE!=="undefined" && PRACTICE[g.id]) || null;
  let practice="";
  if(pr && pr.length){
    const items = pr.map(p=>`<li><div class="q">${p.q} <button class="reveal">显示答案 / Réponse</button></div><div class="a hidden">✓ ${p.a} ${tts(p.a)}${p.note?` <span class="anote">${p.note}</span>`:""}</div></li>`).join("");
    practice = `<div class="practice"><div class="label">练习 · Exercices</div><ol class="qs">${items}</ol></div>`;
  }
  return `<article class="card" id="${g.id}" data-level="${g.level}">
    <h3><span class="ttl">${g.titleFr}</span> ${tts(g.title)} <span class="badge ${g.level}">${g.level}</span> <button class="say-all" title="仅朗读本节(标题+讲解+例句) / Lire cette fiche">▶ 整段朗读</button> <button class="say-from" title="从本节起连续朗读全部,可在顶栏暂停/停止 / Lire en continu à partir d'ici">⏩ 从此连读</button></h3>
    <div class="expl">
      <div class="zh">${g.zh}</div>
      <div class="fr">${tts(g.fr)} ${g.fr}</div>
    </div>
    ${forms}
    <div class="label">例句 · Exemples</div>
    <ul class="ex">${ex}</ul>
    ${tip}
    ${practice}
  </article>`;
}

function matches(g){
  if(activeLevel!=="ALL" && g.level!==activeLevel) return false;
  if(!query) return true;
  const hay = (g.title+g.titleFr+g.zh+g.fr+g.cat+(g.ex||[]).map(e=>e.fr+e.zh).join("")).toLowerCase();
  return hay.includes(query);
}

function render(){
  if(typeof stopSpeak==='function')stopSpeak();
  const list = GRAMMAR.filter(matches);
  // group by level then cat, preserving order
  let html="", lastCat="";
  const order = {A1:1,A2:2,B1:3,B2:4,C1:5,C2:6};
  list.sort((a,b)=> (order[a.level]-order[b.level]) || 0);
  list.forEach(g=>{
    const key = g.level+" · "+g.cat;
    if(key!==lastCat){ html += `<div class="cathead">${g.level} · ${g.cat} <span style="font-weight:400">/ ${g.catFr}</span></div>`; lastCat=key; }
    html += cardHTML(g);
  });
  content.innerHTML = html;
  $("#nores").classList.toggle("hidden", list.length>0);
  $("#count").textContent = `共 ${GRAMMAR.length} 个语法点 · 当前显示 ${list.length} 个`;
  buildSidebar(list);
}

function buildSidebar(list){
  let html = `<div class="brand">法语语法手册<small>Grammaire française · A1–C2</small></div>`;
  let lastLevel="", lastCat="";
  list.forEach(g=>{
    if(g.level!==lastLevel){ html+=`<div class="navlevel">${g.level}</div>`; lastLevel=g.level; lastCat=""; }
    if(g.cat!==lastCat){ html+=`<div class="navcat">${g.cat}</div>`; lastCat=g.cat; }
    html += `<span class="navitem" data-id="${g.id}">${g.titleFr.split(" · ")[0]}</span>`;
  });
  sidebar.innerHTML = html;
  sidebar.querySelectorAll(".navitem").forEach(n=>{
    n.onclick=()=>{
      const el=document.getElementById(n.dataset.id);
      if(el){el.scrollIntoView({behavior:"smooth",block:"start"});
        sidebar.querySelectorAll(".navitem").forEach(x=>x.classList.remove("active"));
        n.classList.add("active");
        closeMenu();}
    };
  });
}

/* ===================== 交互 ===================== */
$("#search").addEventListener("input", e=>{ query=e.target.value.trim().toLowerCase(); render(); });
$("#chips").addEventListener("click", e=>{
  if(!e.target.classList.contains("chip")) return;
  activeLevel=e.target.dataset.l;
  $("#chips").querySelectorAll(".chip").forEach(c=>c.classList.toggle("on", c.dataset.l===activeLevel));
  render();
});
const themeBtn=$("#themeBtn");
function setTheme(t){ document.documentElement.setAttribute("data-theme",t); try{localStorage.setItem("gr-theme",t);}catch(e){} }
themeBtn.onclick=()=>{ const cur=document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark"; setTheme(cur); };
try{ const saved=localStorage.getItem("gr-theme"); if(saved) setTheme(saved); }catch(e){}

/* mobile menu */
const scrim=$("#scrim");
function closeMenu(){ sidebar.classList.remove("open"); scrim.classList.remove("open"); }
$("#menuToggle").onclick=()=>{ sidebar.classList.toggle("open"); scrim.classList.toggle("open"); };
scrim.onclick=closeMenu;

/* ===== TTS(法语朗读:高清神经语音 + 系统语音回退 + 语速调节) =====
   优先播放预生成的高清 mp3(edge-tts,iOS/离线/GitHub Pages 均可用);
   无对应音频或选了系统语音时,回退到浏览器 Web Speech。 */
let frVoice=null, voices=[], rate=0.95, curBtn=null, speakGen=0, speaking=false, paused=false, pendingNext=null;
let useNeural=false, neuralVoice='fr-FR', curAudio=null;
const MAN=(typeof window!=='undefined' && window.AUDIO_MANIFEST) || null;
const audioEl=(typeof Audio!=='undefined') ? new Audio() : null;
if(audioEl){ audioEl.preload='auto'; try{audioEl.preservesPitch=true;audioEl.mozPreservesPitch=true;audioEl.webkitPreservesPitch=true;}catch(e){} }
const voiceSel=document.getElementById('voiceSel'), rateInput=document.getElementById('rate'),
      rateVal=document.getElementById('rateVal'), voiceTest=document.getElementById('voiceTest'),
      ttsPause=document.getElementById('ttsPause'), ttsStop=document.getElementById('ttsStop');
function lsGet(k){try{return localStorage.getItem(k);}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){}}
function setVoiceFromValue(val){
  if(val && val.indexOf('neural:')===0){ useNeural=true; neuralVoice=val.slice(7); frVoice=null; }
  else if(val && val.indexOf('sys:')===0){ useNeural=false; const name=val.slice(4); frVoice=voices.find(v=>v.name===name)||null; }
  else { useNeural=false; frVoice=null; }
}
function applyVoiceChoice(saved){
  const opts=[...voiceSel.options].map(o=>o.value);
  let pick=(saved && opts.indexOf(saved)>=0) ? saved : null;
  if(!pick && MAN && MAN.voices && MAN.voices.length) pick='neural:'+(MAN.voices.indexOf('fr-FR')>=0?'fr-FR':MAN.voices[0]);
  if(!pick){ const s=voices.find(v=>/fr[-_]?FR/i.test(v.lang))||voices.find(v=>/^fr/i.test(v.lang)); if(s)pick='sys:'+s.name; }
  if(!pick && opts.length) pick=opts[0];
  if(pick==null)return;
  voiceSel.value=pick; setVoiceFromValue(pick);
}
function loadVoices(){
  voices=(window.speechSynthesis?speechSynthesis.getVoices():[])||[];
  if(!voiceSel)return;
  const prev=voiceSel.value, saved=lsGet('gr-voice');
  const fr=voices.filter(v=>/^fr/i.test(v.lang));
  voiceSel.innerHTML='';
  if(MAN && MAN.voices){ MAN.voices.forEach(code=>{ const o=document.createElement('option'); o.value='neural:'+code; const lb=(MAN.labels&&MAN.labels[code])||''; o.textContent='🔊 '+code+(lb?' · '+lb:'')+' · 高清'; voiceSel.appendChild(o); }); }
  fr.forEach(v=>{ const o=document.createElement('option'); o.value='sys:'+v.name; o.textContent=v.name.replace(/^(Microsoft|Google)\s+/,'')+' · '+v.lang; voiceSel.appendChild(o); });
  if(!voiceSel.options.length){ const o=document.createElement('option'); o.value=''; o.textContent='系统默认 fr-FR / Défaut'; voiceSel.appendChild(o); }
  applyVoiceChoice(prev || saved);
}
loadVoices();
if('speechSynthesis' in window){ try{window.speechSynthesis.onvoiceschanged=loadVoices;}catch(e){} }
if(voiceSel)voiceSel.addEventListener('change',e=>{ setVoiceFromValue(e.target.value); lsSet('gr-voice',e.target.value); });
if(rateInput){
  const sr=parseFloat(lsGet('gr-rate'));
  if(!isNaN(sr)){rate=sr;rateInput.value=sr;}
  if(rateVal)rateVal.textContent=rate.toFixed(2)+'×';
  rateInput.addEventListener('input',e=>{ rate=parseFloat(e.target.value); if(rateVal)rateVal.textContent=rate.toFixed(2)+'×'; lsSet('gr-rate',e.target.value); if(curAudio){try{curAudio.playbackRate=rate;}catch(err){}} });
}
if(voiceTest)voiceTest.addEventListener('click',()=>speak('Bonjour ! Ceci est un exemple de prononciation française.'));
function updateTransport(){
  if(ttsStop)ttsStop.disabled=!speaking;
  if(ttsPause){ttsPause.disabled=!speaking;ttsPause.textContent=paused?'▶':'⏸';ttsPause.title=paused?'继续 / Reprendre':'暂停 / Pause';}
}
function togglePause(){
  if(!speaking)return;
  if(paused){
    paused=false;
    if(curAudio){curAudio.play().catch(function(){});}
    else if('speechSynthesis' in window){try{speechSynthesis.resume();}catch(e){}}
    if(pendingNext){const f=pendingNext;pendingNext=null;f();}
  }else{
    paused=true;
    if(curAudio){try{curAudio.pause();}catch(e){}}
    else if('speechSynthesis' in window){try{speechSynthesis.pause();}catch(e){}}
  }
  updateTransport();
}
if(ttsPause)ttsPause.addEventListener('click',togglePause);
if(ttsStop)ttsStop.addEventListener('click',stopSpeak);
function clearReading(){document.querySelectorAll('.card.reading').forEach(x=>x.classList.remove('reading'));}
function stopSpeak(){
  speakGen++; speaking=false; paused=false; pendingNext=null;
  try{if('speechSynthesis' in window)speechSynthesis.cancel();}catch(e){}
  if(audioEl){try{audioEl.pause();}catch(e){} audioEl.onended=null; audioEl.onerror=null;}
  curAudio=null;
  document.querySelectorAll('.tts.playing,.say-all.playing,.say-from.playing').forEach(x=>x.classList.remove('playing'));
  clearReading(); curBtn=null; updateTransport();
}
function utter(text){
  const u=new SpeechSynthesisUtterance(text);
  u.lang=(frVoice&&frVoice.lang)||'fr-FR'; if(frVoice)u.voice=frVoice; u.rate=rate;
  return u;
}
function audioURLFor(text){
  if(!useNeural||!MAN||!MAN.map)return null;
  const f=MAN.map[text];
  return f ? (MAN.base+neuralVoice+'/'+f) : null;
}
function speakOne(text,done){
  if(!('speechSynthesis' in window)){done&&done();return;}
  const u=utter(text); u.onend=()=>done&&done(); u.onerror=()=>done&&done();
  try{speechSynthesis.speak(u);}catch(e){done&&done();}
}
function playItems(items,btn){
  items=(items||[]).filter(x=>x&&x.t);
  if(!items.length)return;
  if(!('speechSynthesis' in window) && !(useNeural&&MAN&&audioEl))return;
  stopSpeak(); const gen=speakGen;
  speaking=true; paused=false; curBtn=btn||null; if(btn)btn.classList.add('playing');
  let i=0,lastCard=null;
  function next(){
    if(gen!==speakGen)return;
    if(paused){pendingNext=next;return;}
    if(i>=items.length){speaking=false;if(btn)btn.classList.remove('playing');clearReading();curAudio=null;updateTransport();return;}
    const it=items[i++];
    if(it.card&&it.card!==lastCard){clearReading();it.card.classList.add('reading');try{it.card.scrollIntoView({behavior:'smooth',block:'center'});}catch(e){}lastCard=it.card;}
    const url=audioURLFor(it.t);
    if(url&&audioEl){
      curAudio=audioEl;
      audioEl.onended=()=>{if(gen===speakGen){curAudio=null;next();}};
      audioEl.onerror=()=>{if(gen!==speakGen)return;curAudio=null;speakOne(it.t,()=>{if(gen===speakGen)next();});};
      try{audioEl.pause();}catch(e){}
      audioEl.src=url;
      try{audioEl.playbackRate=rate||1;}catch(e){}
      const pr=audioEl.play();
      if(pr&&pr.catch)pr.catch(()=>{if(gen!==speakGen)return;curAudio=null;speakOne(it.t,()=>{if(gen===speakGen)next();});});
    }else{
      curAudio=null;
      speakOne(it.t,()=>{if(gen===speakGen)next();});
    }
  }
  next(); updateTransport();
}
function speak(text,btn){ playItems([{t:text}],btn); }
/* 事件委托:朗读 + 揭示答案 */
content.addEventListener('click',e=>{
  const sf=e.target.closest('.say-from');
  if(sf){
    stopSpeak();
    const card=sf.closest('.card');
    const cards=[...content.querySelectorAll('.card')];
    const start=cards.indexOf(card); const items=[];
    for(let k=start;k<cards.length;k++){
      [...cards[k].querySelectorAll('.tts')].filter(x=>!x.closest('.practice')).forEach(x=>items.push({t:x.getAttribute('data-tts'),card:cards[k]}));
    }
    playItems(items,null); return;
  }
  const sa=e.target.closest('.say-all');
  if(sa){
    const was=sa.classList.contains('playing'); stopSpeak(); if(was)return;
    const card=sa.closest('.card');
    const items=[...card.querySelectorAll('.tts')].filter(x=>!x.closest('.practice')).map(x=>({t:x.getAttribute('data-tts'),card}));
    playItems(items,sa); return;
  }
  const b=e.target.closest('.tts');
  if(b){speak(b.getAttribute('data-tts'),b);return;}
  const r=e.target.closest('.reveal');
  if(r){
    const li=r.closest('li'); const a=li&&li.querySelector('.a'); if(!a)return;
    const show=a.classList.contains('hidden');
    a.classList.toggle('hidden',!show);
    r.textContent=show?'隐藏答案 / Masquer':'显示答案 / Réponse';
    return;
  }
});

render();
</script>
</body>
</html>
